<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nathan Champagne | AI & Software Engineer</title>
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Bebas Neue';
            font-weight: 100;
            font-style: normal;
            font-display: swap;
            src: url('%PUBLIC_URL%/fonts/bebas-neue/BebasNeue-Thin.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Bebas Neue';
            font-weight: 200;
            font-style: normal;
            font-display: swap;
            src: url('%PUBLIC_URL%/fonts/bebas-neue/BebasNeue-Light.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Bebas Neue';
            font-weight: 300;
            font-style: normal;
            font-display: swap;
            src: url('%PUBLIC_URL%/fonts/bebas-neue/BebasNeue-Book.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Bebas Neue';
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            src: url('%PUBLIC_URL%/fonts/bebas-neue/BebasNeue-Regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Bebas Neue';
            font-weight: 700;
            font-style: normal;
            font-display: swap;
            src: url('%PUBLIC_URL%/fonts/bebas-neue/BebasNeue-Bold.ttf') format('truetype');
        }

        :root {
            --bg-color: #212121;
            --text-primary: #EBEDEC;
            --accent-green: #729E84;
            --accent-blue: #9E9EFF;
            --accent-brown: #B69178;
            --border-soft: rgba(235, 237, 236, 0.1);
            --border-strong: rgba(235, 237, 236, 0.2);
            --font-heading: 'Bebas Neue', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow-x: hidden;
        }

        #root {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
